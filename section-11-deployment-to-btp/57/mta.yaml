_schema-version: 3.3.0
ID: cap-event-management
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: cap-event-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: cap-event-management-auth
      - name: cap-event-management-db
      # - name: cap-event-management-messaging         # ← trial: see caveat below
      # - name: cap-event-management-attachments       # ← trial: see caveat below
      - name: cap-event-management-destination
      # - name: cap-event-management-auditlog          # ← trial: see caveat below

  - name: cap-event-management-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: cap-event-management-db

  - name: cap-event-management
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: cap-event-management-auth
      - name: cap-event-management-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: cap-event-management-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: cap-event-management-auth
      - name: srv-api
      - name: cap-event-management-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: cap-event-management-app
          artifacts:
            - event-management.zip
          target-path: app/

  - name: cap-event-management-app
    type: html5
    path: app/event-management
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: cap-event-management-destination-content
    type: com.sap.application.content
    requires:
      - name: cap-event-management-destination
        parameters:
          content-target: true
      - name: cap-event-management-html5-repo-host
        parameters:
          service-key:
            name: cap-event-management-html5-repo-host-key
      - name: cap-event-management-auth
        parameters:
          service-key:
            name: cap-event-management-auth-key
    parameters:
      content:
        instance:
          destinations:
            - Name: cap_event_management_repo_host
              ServiceInstanceName: cap-event-management-html5-repo-host
              ServiceKeyName: cap-event-management-html5-repo-host-key
              sap.cloud.service: cap-event-management
            - Authentication: OAuth2UserTokenExchange
              Name: cap_event_management_auth
              ServiceInstanceName: cap-event-management-auth
              ServiceKeyName: cap-event-management-auth-key
              sap.cloud.service: cap-event-management
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true

resources:
  - name: cap-event-management-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cap-event-management-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api
    # processed-after:                                 # ← trial: messaging resource commented out below
    #   - cap-event-management-messaging

  - name: cap-event-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # Trial: Event Mesh not available. CAP falls back to file-based messaging.
  # - name: cap-event-management-messaging
  #   type: org.cloudfoundry.managed-service
  #   parameters:
  #     service: enterprise-messaging
  #     service-plan: default
  #     path: ./event-mesh.json

  # Trial: Object Store not available. @cap-js/attachments falls back to DB storage.
  # - name: cap-event-management-attachments
  #   type: org.cloudfoundry.managed-service
  #   parameters:
  #     service: objectstore
  #     service-plan: standard

  - name: cap-event-management-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                HTML5.Timeout: 60000

  - name: cap-event-management-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: cap-event-management-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  # Trial: auditlog premium plan not available. @cap-js/audit-logging silently no-ops.
  # - name: cap-event-management-auditlog
  #   type: org.cloudfoundry.managed-service
  #   parameters:
  #     service: auditlog
  #     service-plan: premium
